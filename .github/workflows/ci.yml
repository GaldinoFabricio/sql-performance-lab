name: CI

on:
   push:
      branches:
         - main
   pull_request:
      branches:
         - main

jobs:
   test:
      runs-on: ubuntu-latest

      services:
         postgres:
            image: postgres:16
            env:
               POSTGRES_USER: postgres
               POSTGRES_PASSWORD: postgres
               POSTGRES_DB: sql_lab
            ports:
               - 5432:5432
            options: >-
               --health-cmd pg_isready
               --health-interval 10s
               --health-timeout 5s
               --health-retries 5

      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: 20

         - name: Install pnpm
           uses: pnpm/action-setup@v3
           with:
              version: 9

         - name: Install dependencies
           run: pnpm install

         - name: Run migrations
           run: pnpm knex migrate:latest
           env:
              DB_HOST: localhost
              DB_PORT: 5432
              DB_NAME: sql_lab
              DB_USER: postgres
              DB_PASSWORD: postgres

         - name: Run seed
           run: pnpm knex seed:run
           env:
              DB_HOST: localhost
              DB_PORT: 5432
              DB_NAME: sql_lab
              DB_USER: postgres
              DB_PASSWORD: postgres

         - name: Run tests
           run: pnpm test
           env:
              DB_HOST: localhost
              DB_PORT: 5432
              DB_NAME: sql_lab
              DB_USER: postgres
              DB_PASSWORD: postgres
